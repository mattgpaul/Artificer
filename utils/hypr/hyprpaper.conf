# Dead-world anchor wallpaper (Sun Eater theme)
preload = ~/.config/hypr/wallpapers/dead-world.jpg
wallpaper = ,~/.config/hypr/wallpapers/dead-world.jpg

# Don't render the hyprpaper splash text on the wallpaper
splash = false

# Keep the preloaded image in RAM even when not shown (only one wallpaper, cheap)
ipc = off
