general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    color = rgba(24332eff)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(e0631fee)
    inner_color = rgba(24332eaa)
    font_color = rgba(e6e6e6ff)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(e6e6e6ff)
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    color = rgba(e6e6e6cc)
    position = 0, 60
    halign = center
    valign = center
}
