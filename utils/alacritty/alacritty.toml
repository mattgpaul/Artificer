[general]
import = ["~/.config/alacritty/themes/matts-green.toml"]

[font]
size = 12.0

[font.normal]
family = "monospace"
style  = "Regular"

[font.bold]
family = "monospace"
style  = "Bold"

[font.italic]
family = "monospace"
style  = "Italic"

[cursor.style]
shape    = "Block"
blinking = "On"

[cursor]
blink_interval = 500

[window]
padding      = { x = 8, y = 8 }
decorations  = "full"
startup_mode = "Maximized"

[scrolling]
history    = 10000
multiplier = 3

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[terminal]
osc52 = "CopyPaste"

[terminal.shell]
program = "/usr/bin/tmux"
args    = ["new-session", "-A", "-s", "workspace"]
